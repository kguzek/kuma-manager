version: 2
updates:
  - package-ecosystem: "pnpm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 15

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    groups:
      payload:
        patterns:
          - "payload"
          - "@payloadcms/*"
